[package]
name = "xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Reticle build automation: the deterministic layout generator, media capture, and perf-check."
publish = false

[lints]
workspace = true

[dependencies]
reticle-geometry = { workspace = true }
reticle-model = { workspace = true }
reticle-io = { workspace = true }
reticle-render = { workspace = true }
# Feature stills reuse the app's demo document and minimap math.
reticle-app = { workspace = true }
image = { version = "0.25.10", default-features = false, features = ["png"] }
# Media capture renders offscreen with reticle-render, writes PNGs with `image`,
# and assembles GIFs with the installed `gifski` CLI.
serde_json = "1.0.150"
# `perf-check` parses the committed baseline and Criterion's `estimates.json`.
