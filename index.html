<script type="module">

</script>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
        color: #cdd6f4;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #reticle-canvas {
        display: block;
        width: 100vw;

      #overlay {
        position: fixed;
        inset: 0;

      }
      #overlay .title {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

        font-size: 0.95rem;

      }
      #overlay .warn {
        color: #f9e2af;
      }

  <link rel="modulepreload" href="/web-a6ce824aff15f64.js" crossorigin="anonymous" integrity="sha384-KwC7amR0YDtBqvNgBgIMudJkQz4o76ap0ZHnPZOYf7kOAuMJ267eMfEhqZYOygjG"><link rel="preload" href="/web-a6ce824aff15f64_bg.wasm" crossorigin="anonymous" integrity="sha384-aL1wU6Gui4ejMdKoeMo1vDsnnj1Bm5rhez/FsTjMGZIQfP1/tKCrB5Xf6jX4QJhM" as="fetch" type="application/wasm"></head>
  <body>
    <canvas id="reticle-canvas"></canvas>
    <div id="overlay">
      <div class="title">Reticle</div>
      <div class="status" id="status">Loading&hellip;</div>
    </div>
    <script>
      // Report the rendering backend to the user. wgpu performs the actual
      // WebGPU -> WebGL2 fallback at the graphics layer (ADR 0009); this only
      // surfaces which path is in use so the demo is honest about capability.
      (function () {
        var status = document.getElementById("status");
        if ("gpu" in navigator) {
          status.textContent = "WebGPU detected. Starting the GPU renderer…";
        } else {
          status.className = "status warn";
          status.textContent =
            "WebGPU is unavailable in this browser; falling back to WebGL2. " +
            "For the full experience use a current version of Chrome or Edge.";
        }
      })();
    </script>
  </body>
