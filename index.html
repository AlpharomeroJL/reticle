<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Reticle</title>
    <meta
      name="description"
      content="Browser-native, GPU-accelerated editor for very large hierarchical 2D IC-layout scenes."
    />
    
<script type="module">
import init, * as bindings from '/web-c3f057a2d57f82a0.js';
const wasm = await init({ module_or_path: '/web-c3f057a2d57f82a0_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
        color: #cdd6f4;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #reticle-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        pointer-events: none;
        text-align: center;
        padding: 1.5rem;
      }
      #overlay .title {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #overlay .status {
        font-size: 0.95rem;
        opacity: 0.8;
      }
      #overlay .warn {
        color: #f9e2af;
      }
      /* A small, always-clickable link to switch between the replay theater (the
         public default) and the full editor. Stays visible after the app mounts. */
      #view-switch {
        position: fixed;
        top: 0.6rem;
        right: 0.8rem;
        z-index: 10;
        font-size: 0.85rem;
        padding: 0.3rem 0.6rem;
        border-radius: 0.4rem;
        background: rgba(30, 34, 45, 0.85);
        color: #cdd6f4;
        text-decoration: none;
        border: 1px solid #313244;
      }
      #view-switch:hover {
        background: rgba(49, 50, 68, 0.95);
      }
    </style>
  <link rel="modulepreload" href="/web-c3f057a2d57f82a0.js" crossorigin="anonymous" integrity="sha384-onvr9LwBgbLzNjkjfAkF43sgysLUQweM+ONunHL9oFcW9MtlwfczEx/CIGGZikhT"><link rel="preload" href="/web-c3f057a2d57f82a0_bg.wasm" crossorigin="anonymous" integrity="sha384-vvs3M9MYNBIHpNMoTkKZS+CRa4hbLbG5uOoCJE7BaabTxMASGS4PqcvcA43v+J1J" as="fetch" type="application/wasm"></head>
  <body>
    <canvas id="reticle-canvas"></canvas>
    <a id="view-switch" href="?view=editor">Open the full editor</a>
    <div id="overlay">
      <div class="title">Reticle</div>
      <div class="status" id="status">Loading the replay theater&hellip;</div>
    </div>
    <script>
      // Report the rendering backend to the user. wgpu performs the actual
      // WebGPU -> WebGL2 fallback at the graphics layer (ADR 0009); this only
      // surfaces which path is in use so the demo is honest about capability.
      (function () {
        var status = document.getElementById("status");
        if ("gpu" in navigator) {
          status.textContent = "WebGPU detected. Starting the GPU renderer…";
        } else {
          status.className = "status warn";
          status.textContent =
            "WebGPU is unavailable in this browser; falling back to WebGL2. " +
            "For the full experience use a current version of Chrome or Edge.";
        }

        // Point the view switch at the other view. The public default (no
        // parameter, or view=replay) is the theater, so offer the editor; when the
        // editor is showing, offer the theater. The Rust entry point reads the same
        // parameter to pick the start view.
        var params = new URLSearchParams(window.location.search);
        var view = (params.get("view") || "replay").toLowerCase();
        var link = document.getElementById("view-switch");
        if (view === "editor") {
          link.textContent = "Open the replay theater";
          link.href = "?view=replay";
        } else {
          link.textContent = "Open the full editor";
          link.href = "?view=editor";
        }
      })();
    </script>
  </body>
</html>
