<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Reticle</title>
    <meta
      name="description"
      content="Browser-native, GPU-accelerated editor for very large hierarchical 2D IC-layout scenes."
    />
    <!--
      PWA install metadata. All paths are RELATIVE so they resolve both at the
      dev root and under the gh-pages subpath (https://.../reticle/). The
      manifest declares start_url/scope "." (relative), and the icons/theme mirror
      the app shell background (#0b0e14).
    -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0b0e14" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <!--
      Failure surface. Trunk injects its own `<script type="module">` in place of
      the `data-trunk rel="rust"` link below; that module does a top-level
      `await init(...)` to fetch and instantiate the wasm. If the fetch 404s (for
      example when the site is served under a subpath but the assets were emitted
      at absolute root), the top-level await rejects with NO catch of its own and
      the page would otherwise sit on the loading spinner forever.

      This classic (non-module) script runs synchronously here in <head>, BEFORE
      Trunk's deferred module executes, so its global handlers are already
      registered when init runs. Any import/init/wasm-fetch failure is turned into
      a visible message in #status instead of a silent hang. A successful boot is
      signalled by Trunk's `TrunkApplicationStarted` event and by main.rs hiding
      the overlay; we cancel the "still loading" watchdog on that event.
    -->
    <script>
      (function () {
        function statusEl() {
          return document.getElementById("status");
        }
        function showError(message) {
          var el = statusEl();
          if (!el) return;
          el.className = "status error";
          el.textContent =
            "Failed to load Reticle: " + message + ". Check the console.";
        }
        function describe(reason) {
          if (!reason) return "unknown error";
          if (reason.message) return String(reason.message);
          return String(reason);
        }

        // The renderer booted: Trunk fires this after init resolves. Mark booted so
        // the watchdog does not later overwrite a live app with a timeout message.
        var booted = false;
        window.addEventListener("TrunkApplicationStarted", function () {
          booted = true;
        });

        // A rejected top-level await in Trunk's loader surfaces here.
        window.addEventListener("unhandledrejection", function (event) {
          booted = true; // stop the watchdog; we are reporting the real cause
          showError(describe(event.reason));
        });
        // A failed module import (network 404 on the .js, syntax error) surfaces as
        // a window error event.
        window.addEventListener(
          "error",
          function (event) {
            var target = event.target;
            // Ignore benign resource-load errors on unrelated elements; report
            // script/module and wasm load failures.
            if (
              target &&
              (target.tagName === "SCRIPT" || target.tagName === "LINK")
            ) {
              booted = true;
              var src = target.src || target.href || "a module";
              showError("could not load " + src);
              return;
            }
            if (event.error) {
              booted = true;
              showError(describe(event.error));
            }
          },
          true,
        );

        // Watchdog: if neither a boot nor an error has been observed after a
        // generous window, tell the user rather than spinning forever. A slow
        // connection legitimately takes a few seconds to stream and compile the
        // wasm, so this is deliberately long and only fires when nothing happened.
        window.addEventListener("DOMContentLoaded", function () {
          setTimeout(function () {
            if (booted) return;
            var el = statusEl();
            if (!el) return;
            el.className = "status warn";
            el.textContent =
              "Reticle is still loading. If this persists, the assets may have " +
              "failed to load; check the browser console for details.";
          }, 20000);
        });
      })();
    </script>
    
<script type="module">
import init, * as bindings from '/reticle/web-7309157832549c56.js';
const wasm = await init({ module_or_path: '/reticle/web-7309157832549c56_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    <!--
      The in-browser GDS -> .rtla convert Web Worker (lane v8-6c). Trunk builds
      bin/convert_worker.rs as a `no-modules` wasm-bindgen bundle emitted at the stable
      (unhashed) names convert_worker.js / convert_worker_bg.wasm. That bundle only
      defines `wasm_bindgen`; it does not boot itself, so the app spawns the classic
      worker `convert-worker-boot.js` below, which importScripts it and calls init.
    -->
    
    
    <!--
      Emit the PWA shell assets into dist. Trunk copies these verbatim into the
      dist root, so the wholesale `dist/*` copy in scripts/deploy-pages.ps1
      carries manifest.json, sw.js, and the icons to gh-pages under /reticle/.
    -->
    
    
    
    
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
        color: #cdd6f4;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #reticle-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        pointer-events: none;
        text-align: center;
        padding: 1.5rem;
      }
      #overlay .title {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #overlay .status {
        font-size: 0.95rem;
        opacity: 0.8;
      }
      #overlay .warn {
        color: #f9e2af;
      }
      #overlay .error {
        color: #f38ba8;
        max-width: 40rem;
      }
      /* Boot splash progress + rotating tip (lane 3a, catalog 97): an honest
         indeterminate activity bar and a cycling one-liner fill the ~0.6s wasm
         streaming/compile window so first paint is never an unexplained blank.
         The overlay itself is still hidden only by main.rs after the WebRunner
         starts, so the boot contract is unchanged. */
      #overlay .progress {
        width: min(280px, 60vw);
        height: 4px;
        border-radius: 2px;
        background: rgba(205, 214, 244, 0.12);
        overflow: hidden;
      }
      #overlay .progress .bar {
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: #6ea8fe;
        animation: reticle-boot 1.1s ease-in-out infinite;
      }
      @keyframes reticle-boot {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(320%);
        }
      }
      #overlay .tip {
        font-size: 0.85rem;
        opacity: 0.65;
        max-width: 34rem;
        min-height: 1.2em;
      }
      /* Respect reduced motion: hold a static bar rather than sweeping it. */
      @media (prefers-reduced-motion: reduce) {
        #overlay .progress .bar {
          animation: none;
          width: 100%;
          opacity: 0.5;
        }
      }
      /* The theater/editor view switch and the in-browser convert action now live on
         the egui toolbar (lane v8-ui), where they participate in the layout instead of
         floating over the canvas and occluding controls. The HTML elements are kept in
         the DOM -- the convert file input still drives the worker, and the boot scripts
         still reference them -- but the floating visuals are hidden. */
      #view-switch,
      #convert-gds {
        display: none;
      }
      /* Transient convert progress/error text. Anchored bottom-center over the canvas
         (clear of the toolbar and side panels) so it never covers a clickable control;
         only shown while a conversion is in flight. */
      #convert-status {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-size: 0.8rem;
        color: #f9e2af;
        max-width: 28rem;
        text-align: center;
        pointer-events: none;
      }
    </style>
  <link rel="modulepreload" href="/reticle/web-7309157832549c56.js" crossorigin="anonymous" integrity="sha384-PnVfJsxC7ifFiHRQ3ZSOkYMUaClZDF6VoetOR7o7nrONMLVS4Dv4sjgmyb/ViOxg"><link rel="preload" href="/reticle/web-7309157832549c56_bg.wasm" crossorigin="anonymous" integrity="sha384-agvnEE8cUFZleQ4vcI/m2DoabA9aj5953Qhjg9HhYoqoSdpIXnDVVwryshx4Dv7Y" as="fetch" type="application/wasm"></head>
  <body>
    <canvas id="reticle-canvas"></canvas>
    <a id="view-switch" href="?view=editor">Open the full editor</a>
    <!--
      In-browser GDS -> archive conversion (lane v8-6c). Picking a .gds runs the convert
      Web Worker, which writes an .rtla into OPFS; the page then reopens it through the
      streaming `?archive=` path. A plain <label>+<input> so it works with no app changes.
    -->
    <label id="convert-gds" title="Convert a GDS to a streamable .rtla archive, in your browser">
      Convert GDS &rarr; archive
      <input id="convert-gds-input" type="file" accept=".gds,.gds2,.gdsii" hidden />
    </label>
    <div id="convert-status"></div>
    <div id="overlay">
      <div class="title">Reticle</div>
      <div class="status" id="status">Loading the replay theater&hellip;</div>
      <div class="progress" id="boot-progress" aria-hidden="true">
        <div class="bar"></div>
      </div>
      <div class="tip" id="boot-tip"></div>
    </div>
    <script>
      // Rotating boot tip (lane 3a, catalog 97). Cycles a short one-liner while the
      // wasm streams and compiles, so the loading window teaches instead of sitting
      // blank. Stops the moment the renderer boots (Trunk fires the event; main.rs
      // then hides the whole overlay), so it never competes with the live app.
      (function () {
        var tips = [
          "Scroll to zoom to the cursor, drag to pan.",
          "Press F to fit the design; Shift+F fits the selection.",
          "Press ? for the full list of keyboard shortcuts.",
          "The minimap (N) shows where you are; click or drag it to jump.",
          "Streamed dies load tile by tile, coarse detail first.",
          "Ctrl+P opens the command palette for every action.",
          "Double-click a shape to frame it; double-click empty space to fit all.",
        ];
        var el = document.getElementById("boot-tip");
        if (!el) return;
        var i = 0;
        el.textContent = tips[0];
        var timer = setInterval(function () {
          i = (i + 1) % tips.length;
          el.textContent = tips[i];
        }, 2400);
        function stop() {
          clearInterval(timer);
        }
        window.addEventListener("TrunkApplicationStarted", stop);
      })();
    </script>
    <script>
      // Report the rendering backend to the user. wgpu performs the actual
      // WebGPU -> WebGL2 fallback at the graphics layer (ADR 0009); this only
      // surfaces which path is in use so the demo is honest about capability.
      // It never claims WebGPU when navigator.gpu is absent: the WebGL2 fallback
      // notice is shown instead, and wgpu takes the WebGL2 path at the graphics
      // layer so the canvas still renders.
      (function () {
        var status = document.getElementById("status");
        // Do not stomp on an error already surfaced by the failure-handler above.
        if (status && status.className.indexOf("error") === -1) {
          if ("gpu" in navigator) {
            status.textContent = "WebGPU detected. Starting the GPU renderer…";
          } else {
            status.className = "status warn";
            status.textContent =
              "WebGPU is unavailable in this browser; falling back to WebGL2. " +
              "For the full experience use a current version of Chrome or Edge.";
          }
        }

        // Point the (now hidden) view-switch link at the other view, kept in sync for
        // the boot window before the app mounts. The public default (no parameter, or
        // view=replay) is the theater, so offer the editor; when the editor is showing,
        // offer the theater. The Rust entry point reads the same parameter to pick the
        // start view.
        var params = new URLSearchParams(window.location.search);
        var view = (params.get("view") || "replay").toLowerCase();
        var link = document.getElementById("view-switch");
        if (view === "editor") {
          link.textContent = "Open the replay theater";
          link.href = "?view=replay";
        } else {
          link.textContent = "Open the full editor";
          link.href = "?view=editor";
        }

        // The egui toolbar's view-switch button (lane v8-ui) calls this to navigate.
        // The target is recomputed from the live URL so it is correct regardless of the
        // current view, mirroring the link behaviour above.
        window.__reticleSwitchView = function () {
          var p = new URLSearchParams(window.location.search);
          var v = (p.get("view") || "replay").toLowerCase();
          window.location.search = v === "editor" ? "?view=replay" : "?view=editor";
        };
      })();
    </script>
    <script>
      // Register the service worker so the app is installable and loads its
      // shell offline. "./sw.js" is RELATIVE, so it resolves under the dev root
      // AND the gh-pages /reticle/ subpath; the scope is derived from the
      // document location (the directory this page was served from), which is
      // the same directory sw.js lives in. Registered on window "load" so it
      // never competes with the wasm boot. This is a no-op where service workers
      // are unsupported or the page is opened from file://, and a registration
      // failure is logged, never fatal.
      (function () {
        if (!("serviceWorker" in navigator)) return;
        if (window.location.protocol === "file:") return;
        var scope = new URL("./", window.location.href).pathname;
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("./sw.js", { scope: scope })
            .catch(function (err) {
              console.warn("service worker registration failed:", err);
            });
        });
      })();
    </script>
    <script>
      // In-browser GDS -> .rtla conversion driver (lane v8-6c). Runs the convert Web
      // Worker on a chosen/dropped GDS, then reopens the resulting OPFS archive through
      // the existing `?archive=` streaming path. Exposes __reticleConvertGds /
      // __reticleOpenArchive so the browser e2e can drive the same flow programmatically.
      (function () {
        var WORKER_URL = "convert-worker-boot.js";

        function setStatus(text) {
          var el = document.getElementById("convert-status");
          if (el) el.textContent = text || "";
        }

        // Drive the worker for one GDS byte buffer. Resolves with the worker's `done`
        // message ({ path, records, bytes }); rejects on a worker error.
        function convertGdsToArchive(bytes, name) {
          return new Promise(function (resolve, reject) {
            var worker;
            try {
              worker = new Worker(WORKER_URL);
            } catch (e) {
              reject(e);
              return;
            }
            var settled = false;
            worker.onmessage = function (ev) {
              var msg = ev.data || {};
              if (msg.type === "ready") {
                worker.postMessage({ gds: bytes, name: name || "converted.rtla" });
              } else if (msg.type === "status") {
                setStatus("Converting: " + msg.stage + "…");
              } else if (msg.type === "done") {
                settled = true;
                worker.terminate();
                resolve(msg);
              } else if (msg.type === "error") {
                settled = true;
                worker.terminate();
                reject(new Error(msg.message || "conversion failed"));
              }
            };
            worker.onerror = function (e) {
              if (settled) return;
              settled = true;
              try {
                worker.terminate();
              } catch (_) {
                /* ignore */
              }
              reject(new Error((e && e.message) || "worker error"));
            };
          });
        }

        // Reopen the OPFS archive at `opfsPath` (e.g. "archives/converted.rtla") through
        // the streaming path: the service worker serves it over Range at this URL.
        function openConvertedArchive(opfsPath) {
          var url = new URL("opfs-archive/" + opfsPath, window.location.href).toString();
          window.location.search =
            "?archive=" + encodeURIComponent(url) + "&view=editor";
        }

        window.__reticleConvertGds = convertGdsToArchive;
        window.__reticleOpenArchive = openConvertedArchive;

        var input = document.getElementById("convert-gds-input");

        // The egui toolbar's "Convert GDS -> archive" button (lane v8-ui) calls this to
        // open the file picker; the change handler below then runs the worker. The input
        // stays a hidden element in the DOM, so a programmatic click still opens the
        // native picker.
        window.__reticleTriggerConvert = function () {
          if (input) input.click();
        };

        if (input) {
          input.addEventListener("change", function () {
            var file = input.files && input.files[0];
            if (!file) return;
            var archiveName = file.name.replace(/\.[^.]+$/, "") + ".rtla";
            setStatus("Reading " + file.name + "…");
            file
              .arrayBuffer()
              .then(function (buf) {
                return convertGdsToArchive(new Uint8Array(buf), archiveName);
              })
              .then(function (msg) {
                setStatus("Converted " + msg.records + " shapes; opening…");
                openConvertedArchive(msg.path);
              })
              .catch(function (err) {
                console.error("convert failed:", err);
                setStatus("Convert failed: " + (err && err.message ? err.message : err));
              });
          });
        }
      })();
    </script>
  </body>
</html>
