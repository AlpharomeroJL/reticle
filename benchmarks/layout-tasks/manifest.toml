# Layout-tasks suite for the Reticle agent benchmark (v0.3.0).
#
# The 3 sample tasks prove the machinery end to end against the mock model;
# the 50 authored tasks span tiers 1-4: primitive placement and legality,
# structured geometry (contacts, via chains, combs, guard rings),
# connectivity-intent, and compound cells. The 10 tier-5 tasks are grounded in
# the real SKY130 PDK: named periphery rules (m1.1, m1.4, m2.4, li.5, ct.1,
# licon.1, via.1a) and the measured geometry of the sky130_fd_sc_hd tap and
# fill cells. Bump `version` when tasks change.
