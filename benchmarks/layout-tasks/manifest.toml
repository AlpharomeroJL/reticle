# Layout-tasks suite for the Reticle agent benchmark (v0.5.0).
#
# The 3 sample tasks prove the machinery end to end against the mock model;
# the 50 authored tasks span tiers 1-4: primitive placement and legality,
# structured geometry (contacts, via chains, combs, guard rings),
# connectivity-intent, and compound cells. The 10 tier-5 tasks are grounded in
# the real SKY130 PDK: named periphery rules (m1.1, m1.4, m2.4, li.5, ct.1,
# licon.1, via.1a) and the measured geometry of the sky130_fd_sc_hd tap and
# fill cells.
#
# v0.4.0 adds 12 Wave-3 tasks that exercise the boolean/align/array/via-stack tool
# surface: 3 boolean-op constructions (union/intersection/difference, checked by
# `boolean_result` on the result area with the inputs consumed), 3 array-with-pitch
# placements (checked by `array_pitch` on count and step), 3 via-stack builds (checked
# by `contact_stack` on connectivity and enclosure), and 3 iterative-refinement tasks
# (an initial prompt plus a scripted `refinement` follow-up the refinement-aware runner
# folds in between iterations).
#
# v0.5.0 adds 8 generator tasks that exercise the six parameterized layout generators
# through natural language (guard ring, a 4x4 and a 6x6 via farm, li1 decap fill at a
# target density, a van der Pauw and a serpentine test structure, an I/O pad ring, and
# a seal ring). Each is checked by the `generator` checker, which re-runs the named
# generator to build a per-layer shape-count fingerprint the graded document must meet
# and requires the result to be DRC-clean under the SKY130 subset. Bump `version` when
# tasks change.
#
# v0.6.0 adds 5 coverage tasks that exercise checker code paths no earlier task reached:
# a `shape_count` with both a min and a max bound (the count-range branch), a `layer_area`
# with both a min and a max bound (the area-window branch), a `contact_stack` on the via2
# (69/44) met2/met3 stack with an enclosure floor, a `boolean_result` pinned to the XOR
# area (union/intersection/difference were already covered, XOR was not), and a six-via
# via1 chain. Each is proved solvable and graded by a deterministic MockModel script in
# `crates/reticle-bench/tests/new_tasks_freeze.rs`, which also pins the frozen output
# (result records and the rendered leaderboard) byte-for-byte across two runs.
