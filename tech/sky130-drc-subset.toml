# SKY130 DRC rule subset for Reticle.
#
# A SUBSET of the SkyWater periphery rules for the digital metal stack. Passing
# this deck is NOT tape-out clean; it covers min width, spacing, a few key contact
# and via sizes, enclosures, minimum areas, and the poly endcap. See the coverage
# table in the docs for exactly what is and is not checked.
#
# Source: SkyWater SKY130 Periphery Rules (Al flow),
#   https://skywater-pdk.readthedocs.io/en/main/rules/periphery.html
#   (generated from docs/rules/periphery/periphery.csv in github.com/google/skywater-pdk)
#
# Values are in database units (1 dbu = 1 nm), so a 0.17 um rule is 170. Areas are
# in dbu squared (0.0561 um^2 = 56100). `layer`/`other_layer` are [gds_layer, datatype].
# `kind` is one of: width, spacing, enclosure, extension, area.

# --- Local interconnect (li1) ---
[[rule]]
id = "li.1"
kind = "width"
layer = [67, 20]
value_dbu = 170
description = "Min width of li1"

[[rule]]
id = "li.3"
kind = "spacing"
layer = [67, 20]
value_dbu = 170
description = "Min spacing of li1 to li1"

[[rule]]
id = "li.6"
kind = "area"
layer = [67, 20]
value_dbu = 56100
description = "Min area of li1 (0.0561 um^2)"

