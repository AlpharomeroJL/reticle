# IHP SG13G2 DRC rule subset for Reticle.
#
# A SUBSET of the IHP SG13G2 back-end-of-line (BEOL) rules for the digital metal
# stack. Passing this deck is NOT tape-out clean; it covers min width, min spacing,
# the contact/via sizes, and the via metal enclosures for Metal1..Metal4 and the
# Cont/Via1/Via2/Via3 cuts. It deliberately omits rules the Reticle generators do not
# draw against: the wide-metal and pattern-density spacing variants (M*.e/M*.f, which
# the reticle-drc engine cannot express as width-conditional), the FEOL Activ/GatPoly
# contact enclosures (the generators draw no Activ/GatPoly), and the thick TopMetal
# stack. See the second-PDK chapter of the book for the coverage table.
#
# Source: IHP-GmbH/IHP-Open-PDK (branch main), the KLayout DRC runset under
#   ihp-sg13g2/libs.tech/klayout/tech/drc/rule_decks/ . Rule ids (e.g. "M1.a") are
#   quoted verbatim from those files. License: Apache-2.0 (repo LICENSE).
#   Metal1:   .../beol/5_16_metal1.drc
#   Metal2-5: .../beol/5_17_metaln.drc
#   Via1:     .../beol/5_19_via1.drc
#   Via2-4:   .../beol/5_20_vian.drc
#   Cont:     .../feol/5_14_cont.drc
#   Layer GDS map: .../drc/rule_decks/layers_def.drc
#   dbu:      ihp-sg13g2/libs.tech/klayout/tech/sg13g2.lyt (<dbu>0.001</dbu>)
#
# Values are in database units (1 dbu = 1 nm; per sg13g2.lyt, 0.001 um resolution),
# so a 0.16 um rule is 160. `layer`/`other_layer` are [gds_layer, datatype]; drawing
# purpose is datatype 0. `kind` is one of: width, spacing, enclosure.

# --- Metal1 (8/0) ---
[[rule]]
id = "M1.a"
kind = "width"
layer = [8, 0]
value_dbu = 160
description = "Min width of Metal1 (0.16 um)"

[[rule]]
id = "M1.b"
kind = "spacing"
layer = [8, 0]
value_dbu = 180
description = "Min spacing of Metal1 to Metal1 (0.18 um)"

