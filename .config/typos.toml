# typos-cli configuration. Part of the `just ci` gate.

[files]
extend-exclude = [
    "*.gds",
    "*.oas",
    "*.rgds",
    "assets/**",
    "docs/book/**",
    "**/corpus/**",
    "CHANGELOG.md",
    "Cargo.lock",
    "reticle-autonomous-build-plan.md",
    "*.min.js",
    "docs/mermaid-init.js",
]

[default]
# Git commit hashes (lowercase hex, 7 to 40 chars) are referenced throughout the
# docs and status notes; ignore them so a hash that happens to spell a typo prefix
# (for example ba73217, where "ba" reads as "by") does not trip the gate.
extend-ignore-re = ['\b[0-9a-f]{7,40}\b', '\\u\{[0-9a-fA-F]+\}']

[default.extend-words]
# EDA / graphics / domain vocabulary that is not a typo.
# Synopsys is an EDA company name (not "synopsis").
Synopsys = "Synopsys"
oas = "oas"
nin = "nin"
ser = "ser"
inout = "inout"
LOD = "LOD"
lod = "lod"
# Paired integer pixel coordinates (ix, iy) in render tests.
iy = "iy"
# RFC 4648 base64 test vector ("" f fo foo foob fooba foobar) in reticle-mcp.
fo = "fo"
# IHP SG13G2 process layer name: the active-area layer is spelled "Activ" (not "Active").
Activ = "Activ"
# OASIS extension-scheme byte notation `0000SSEE` (two S bits, two E bits) in oasis_std.
SSEE = "SSEE"
# flate2 is the gzip/deflate crate name (the bundle-size ledger tool uses it); typos
# splits the identifier on the digit and reads the "flate" stem as "flat".
flate = "flate"
