[package]
name = "reticle-sync"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Real-time collaboration for Reticle: a yrs CRDT over the model, presence, and comments."
keywords = ["crdt", "yrs", "collaboration", "sync", "eda"]
categories = ["data-structures", "concurrency"]

[lints]
workspace = true

[dependencies]
reticle-geometry = { workspace = true }
reticle-model = { workspace = true }
reticle-proto = { workspace = true }
# The live-session wire codec (`crate::frame`) encodes and decodes the frozen
# `reticle_proto::v1::SyncMessage` envelope with prost. The same version
# `reticle-proto` already resolves, so no new copy is pulled into the lockfile;
# it builds for wasm32 too, so the browser transport shares the codec.
prost = "0.14.4"
# The `sync` feature makes `yrs` observers (and thus the per-actor `UndoManager`
# a `SyncDocument` owns) `Send + Sync`, so `SyncDocument` stays `Send + Sync` and
# can be driven from a `tokio` task (the live-agent path spawns one across threads).
yrs = { version = "0.23", features = ["sync"] }

[dev-dependencies]
proptest = "1.11.0"
# Wave 3 wires `yrs` (CRDT) and the presence/comment protocol (ADR 0007).
