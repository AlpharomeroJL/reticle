[package]
name = "reticle-app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "The interactive Reticle application: egui UI, tools, and the editing suite. Native and WASM."
keywords = ["egui", "cad", "editor", "eda", "layout"]
categories = ["gui", "graphics"]

[lib]
name = "reticle_app"
path = "src/lib.rs"

[[bin]]
name = "reticle-app"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
eframe = "0.35.0"
egui-wgpu = "0.35.0"
reticle-geometry = { workspace = true }
reticle-model = { workspace = true }
reticle-index = { workspace = true }
reticle-render = { workspace = true }
reticle-sync = { workspace = true }
reticle-drc = { workspace = true }
reticle-extract = { workspace = true }

# The agent panel and the replay theater drive the frozen agent command API
# (`Session`, `Transcript`, `AgentCommand`). That crate does not compile for
# wasm32 today: its `render_png` command calls the native-only blocking GPU
# context in `reticle-render`. Both features are therefore native-only and the
# corresponding modules are cfg-gated out of the web build.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reticle-agent-api = { workspace = true }
serde_json = { workspace = true }

# `reticle-io` parses the committed SKY130 technology file so the cross-section
# test checks real process-stack z bands rather than hand-built entries.
[dev-dependencies]
reticle-io = { workspace = true }
