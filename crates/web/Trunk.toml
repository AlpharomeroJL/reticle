# Trunk configuration for the Reticle WebAssembly demo.
# Build with `just web-build` (release) or `just web-serve` (dev server).

[build]
target = "index.html"
dist = "dist"
release = false

[serve]
address = "127.0.0.1"
port = 8080
open = false

# wasm-opt is applied per-artifact via the `data-wasm-opt` attribute in index.html.
