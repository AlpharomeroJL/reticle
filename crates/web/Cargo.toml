[package]
name = "web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "The Reticle WebAssembly harness: mounts the egui app in the browser."
publish = false

[lints]
workspace = true

# The harness is only meaningfully built for wasm (via Trunk). Its native build is
# a no-op `main`, so `cargo build --workspace` stays green on the host without
# pulling any of the wasm-only dependencies.
[target.'cfg(target_arch = "wasm32")'.dependencies]
reticle-app = { workspace = true }
eframe = "0.35.0"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlCanvasElement"] }
console_error_panic_hook = "0.1"
