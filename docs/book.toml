[book]
title = "Reticle"
authors = ["Josef Long"]
description = "A browser-native, GPU-accelerated editor for very large hierarchical 2D IC-layout scenes."
src = "src"
language = "en"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/AlpharomeroJL/reticle"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
