# cargo-deny configuration. Part of the `just ci` gate (license + advisory audit).
# Schema v2 (cargo-deny >= 0.14).

[advisories]
version = 2
# Fail on security vulnerabilities; downgrade unmaintained/notice to warnings so a
# transitive advisory does not block an unattended build. Vulnerabilities still fail.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses acceptable for a dual MIT/Apache-2.0 project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]

[bans]
# The graphics/EDA stack legitimately pulls duplicate minor versions; warn only.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
