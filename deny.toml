# cargo-deny configuration. Part of the `just ci` gate (license + advisory audit).
# Schema v2 (cargo-deny >= 0.14).

[advisories]
version = 2
# Fail on security advisories by default. An advisory is ignored only with a specific
# reason and a revisit trigger, and only when we cannot act on it: the crate is pinned
# by a transitive dependency we do not control, and either the advisory is
# "unmaintained" (not a vulnerability) or the vulnerable code path is not reachable on
# any target Reticle builds or ships. See docs/decisions/0017.
ignore = [
    # `yaml-rust` is unmaintained (not vulnerable), reached only transitively via
    # gds21 -> layout21utils -> serde_yaml. No safe upgrade is available upstream.
    "RUSTSEC-2024-0320",
    # `ttf-parser` is unmaintained (not vulnerable), reached only transitively via
    # eframe -> egui-winit -> winit font handling. No safe upgrade is available.
    "RUSTSEC-2026-0192",
    # `quick-xml` 0.39 has two companion advisories, both denial-of-service bugs on
    # untrusted XML and both fixed only in >= 0.41: RUSTSEC-2026-0194 (quadratic time
    # checking a start tag for duplicate attribute names) and RUSTSEC-2026-0195
    # (unbounded namespace-declaration allocation in NsReader). quick-xml is reached
    # only through the Linux accessibility stack (eframe -> winit ->
    # smithay-client-toolkit -> wayland-scanner, plus zbus_xml), which is not compiled
    # on our Windows or wasm targets, and Reticle never feeds untrusted XML through it.
    # wayland-scanner 0.31 pins `^0.39`, so no upgrade is reachable without forking the
    # eframe 0.35 winit chain. Revisit when eframe updates its winit/smithay chain.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses acceptable for a dual MIT/Apache-2.0 project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    # Font licenses for the fonts egui bundles (Ubuntu and emoji fonts).
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[bans]
# The graphics/EDA stack legitimately pulls duplicate minor versions; warn only.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
